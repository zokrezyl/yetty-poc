<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Horizontal linear gradient: red to blue -->
    <linearGradient id="horizGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0000ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Vertical linear gradient: green to yellow -->
    <linearGradient id="vertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:1" />
    </linearGradient>
    
    <!-- Diagonal linear gradient: purple to orange -->
    <linearGradient id="diagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9900ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9900;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial gradient: white center to black edge -->
    <radialGradient id="radGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Horizontal gradient rectangle -->
  <rect x="10" y="10" width="130" height="80" fill="url(#horizGrad)"/>
  
  <!-- Vertical gradient rectangle -->
  <rect x="160" y="10" width="130" height="80" fill="url(#vertGrad)"/>
  
  <!-- Diagonal gradient rectangle -->
  <rect x="10" y="110" width="130" height="80" fill="url(#diagGrad)"/>
  
  <!-- Radial gradient rectangle -->
  <rect x="160" y="110" width="130" height="80" fill="url(#radGrad)"/>
</svg>
