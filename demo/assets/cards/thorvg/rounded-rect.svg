<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Simple rounded rectangles with different corner radii -->
  <rect x="20" y="20" width="100" height="70" rx="10" ry="10" fill="#3498db"/>
  <rect x="140" y="20" width="100" height="70" rx="20" ry="20" fill="#e74c3c"/>
  <rect x="260" y="20" width="100" height="70" rx="35" ry="35" fill="#2ecc71"/>
  
  <!-- Rounded rectangles with strokes -->
  <rect x="20" y="110" width="100" height="70" rx="15" ry="15" 
        fill="#9b59b6" stroke="#8e44ad" stroke-width="3"/>
  <rect x="140" y="110" width="100" height="70" rx="25" ry="25" 
        fill="#f39c12" stroke="#d68910" stroke-width="2"/>
  <rect x="260" y="110" width="100" height="70" rx="5" ry="5" 
        fill="#1abc9c" stroke="#16a085" stroke-width="4"/>
  
  <!-- Stroke-only rounded rectangles -->
  <rect x="20" y="200" width="100" height="70" rx="12" ry="12" 
        fill="none" stroke="#e74c3c" stroke-width="2"/>
  <rect x="140" y="200" width="100" height="70" rx="20" ry="20" 
        fill="none" stroke="#3498db" stroke-width="3"/>
  <rect x="260" y="200" width="100" height="70" rx="30" ry="30" 
        fill="none" stroke="#2ecc71" stroke-width="2"/>
</svg>
