<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Cubic bezier curves -->
  <path d="M20,150 C60,50 140,50 180,150" fill="none" stroke="#3498db" stroke-width="3"/>
  <path d="M200,150 C240,50 320,250 360,150" fill="none" stroke="#e74c3c" stroke-width="3"/>
  
  <!-- S-curve wave -->
  <path d="M20,220 C80,180 120,260 180,220 C240,180 280,260 340,220" 
        fill="none" stroke="#2ecc71" stroke-width="2"/>
  
  <!-- Heart shape with fill -->
  <path d="M200,80 C180,60 150,60 150,90 C150,120 200,150 200,150 
           C200,150 250,120 250,90 C250,60 220,60 200,80" 
        fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  
  <!-- Spiral-like curve -->
  <path d="M50,50 C100,20 130,80 100,100 C70,120 40,80 70,60" 
        fill="none" stroke="#9b59b6" stroke-width="2"/>
  
  <!-- Infinity symbol -->
  <path d="M280,50 C250,20 220,20 220,50 C220,80 250,80 280,50 
           C310,20 340,20 340,50 C340,80 310,80 280,50" 
        fill="none" stroke="#f39c12" stroke-width="3"/>
</svg>
