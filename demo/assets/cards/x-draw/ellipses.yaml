background: "#1a1a2e"

body:
  # Red ellipse - horizontal
  - ellipse:
      position: [100, 80]
      radii: [60, 30]
      fill: "#ff0000"

  # Green ellipse - vertical
  - ellipse:
      position: [250, 80]
      radii: [30, 50]
      fill: "#00ff00"

  # Blue ellipse with stroke
  - ellipse:
      position: [100, 180]
      radii: [50, 40]
      fill: "#0000ff"
      stroke: "#ffffff"
      stroke-width: 3

  # Yellow ellipse - circular (equal radii)
  - ellipse:
      position: [250, 180]
      radii: [40, 40]
      fill: "#ffff00"

  # Cyan ellipse - wide
  - ellipse:
      position: [175, 130]
      radii: [80, 20]
      fill: "#00ffff"
